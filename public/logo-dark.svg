<svg width="360" height="100" viewBox="0 0 360 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hubBgDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Glow filter for the Hub box border -->
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- "Flop" text in white -->
  <text x="0" y="76" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-3">Flop</text>

  <!-- Hub rounded rectangle with glow -->
  <g filter="url(#glowFilter)">
    <rect x="180" y="10" width="148" height="80" rx="18" fill="url(#hubBgDark)"/>
    <rect x="180" y="10" width="148" height="80" rx="18" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.6"/>
  </g>
  
  <!-- "Hub" text inside box -->
  <text x="254" y="68" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff" letter-spacing="-1.5">Hub</text>
</svg>
